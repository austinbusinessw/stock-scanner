name: Daily Stock Scanner

on:
  schedule:
    # Run daily at 6 PM ET (22 UTC) after market close
    - cron: '0 22 * * 1-5'  # Mon-Fri only
  workflow_dispatch:  # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install requests pandas pandas-ta numpy
      - name: Run scanner
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
        run: python .github/scanner.py
